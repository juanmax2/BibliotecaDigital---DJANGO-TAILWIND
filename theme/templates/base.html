{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Biblioteca</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    {% tailwind_css %}
</head>

<body class="flex flex-col min-h-screen bg-linear-to-b from-teal-50 to-teal-200">
    {% include '_includes/_header.html' %}

    <main class="flex-1">

        {% block page_content %}

        {% endblock %}

    </main>

    {% include '_includes/_footer.html' %}

    <script>
        const menuBtn = document.getElementById('btnMenu')
        const containerMenu = document.getElementById('containerMenu')

        menuBtn.addEventListener('click', (event)=>{
            event.preventDefault()
            if (!menuBtn.classList.contains('bg-white') && !menuBtn.classList.contains('rounded-2xl')){
                menuBtn.classList.add("bg-white", 'rounded-2xl')
            }else{
                menuBtn.classList.remove('bg-white', 'rounded-2xl')
            }
            
            // menuBtn.classList.add('rounded-2xl')
            containerMenu.classList.toggle('hidden')
        })

        document.addEventListener('click', (event)=>{
            const isClickInside = menuBtn.contains(event.target) || containerMenu.contains(event.target)

            if (!isClickInside){
                containerMenu.classList.add('hidden')

                menuBtn.classList.remove('bg-white', 'rounded-2xl')
            }
        })
        document.addEventListener('DOMContentLoaded', function(){
            container_message = document.getElementById('messages-container')
            if (container_message) {
                setTimeout(function(){
                    container_message.style.transition = "opacity 0.5s ease"
                    container_message.style.setProperty("opacity", "0", "important")

                    setTimeout(function() {
                        container_message.remove()
                    }, 500)
                } ,2000)
            }
        })

        const searchInput = document.getElementById('q')
        const resultsContainer = document.getElementById('book-results')
        let timeout = null

        searchInput.addEventListener('keyup', function(){
            clearTimeout(timeout)

            timeout = setTimeout(() => {
                const query = searchInput.value

                fetch(`{% url 'book_list' %}?q=${query}`, {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser()
                    const doc = parser.parseFromString(html, 'text/html')
                    const newResults = doc.getElementById('book-results').innerHTML
                    resultsContainer.innerHTML = newResults
                })
            }, 300)
        })
    </script>
</body>
</html>
